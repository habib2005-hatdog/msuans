<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MSUans Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a2e1a;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Login Screen ── */
    #login-screen {
      background: #22381f;
      border: 2px solid #c9a84c;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      width: 360px;
    }

    #login-screen h1 {
      color: #c9a84c;
      font-size: 2rem;
      letter-spacing: 2px;
    }

    #login-screen p {
      color: #a0b89a;
      margin: 8px 0 24px;
      font-size: 0.9rem;
    }

    #login-screen input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #c9a84c55;
      background: #1a2e1a;
      color: #f0f0f0;
      font-size: 1rem;
      margin-bottom: 16px;
      outline: none;
    }

    #login-screen input:focus {
      border-color: #c9a84c;
    }

    #login-screen button {
      width: 100%;
      padding: 12px;
      background: #c9a84c;
      color: #1a2e1a;
      font-weight: bold;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #login-screen button:hover { background: #e0c060; }

    /* ── Chat Screen ── */
    #chat-screen {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 640px;
      height: 100vh;
    }

    #chat-header {
      background: #22381f;
      border-bottom: 2px solid #c9a84c33;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #chat-header h2 {
      color: #c9a84c;
      font-size: 1.3rem;
      letter-spacing: 1px;
    }

    #status {
      font-size: 0.8rem;
      color: #a0b89a;
    }

    #skip-btn {
      background: transparent;
      border: 1px solid #c9a84c;
      color: #c9a84c;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    #skip-btn:hover { background: #c9a84c22; }
    #skip-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 70%;
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .bubble.me {
      background: #c9a84c;
      color: #1a2e1a;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.stranger {
      background: #2e4a2a;
      color: #f0f0f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .system-msg {
      text-align: center;
      font-size: 0.8rem;
      color: #7a9a74;
      font-style: italic;
    }

    #input-area {
      background: #22381f;
      border-top: 2px solid #c9a84c33;
      padding: 16px 20px;
      display: flex;
      gap: 10px;
    }

    #msg-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid #c9a84c44;
      background: #1a2e1a;
      color: #f0f0f0;
      font-size: 0.95rem;
      outline: none;
    }

    #msg-input:focus { border-color: #c9a84c; }
    #msg-input:disabled { opacity: 0.5; }

    #send-btn {
      background: #c9a84c;
      color: #1a2e1a;
      border: none;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #send-btn:hover { background: #e0c060; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen">
    <h1>MSUans</h1>
    <p>Chat anonymously with fellow MSU students</p>
    <input type="text" id="username-input" placeholder="Enter a username" maxlength="20" />
    <button onclick="startChat()">Start Chatting</button>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen">
    <div id="chat-header">
      <h2>MSUans</h2>
      <span id="status">Connecting...</span>
      <button id="skip-btn" onclick="skip()" disabled>Skip ⏭</button>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="msg-input" placeholder="Type a message..." disabled />
      <button id="send-btn" onclick="sendMessage()" disabled>➤</button>
    </div>
  </div>

  <script>
    let socket
    let username

    function startChat() {
      const input = document.getElementById('username-input').value.trim()
      if (!input) return alert('Please enter a username!')
      username = input

      document.getElementById('login-screen').style.display = 'none'
      document.getElementById('chat-screen').style.display = 'flex'

      connectWebSocket()
    }

    function connectWebSocket() {
      socket = new WebSocket('ws://localhost:3000')

      socket.onopen = () => {
        // Tell the server we want to join
        socket.send(JSON.stringify({ type: 'join', username }))
      }

      socket.onmessage = (event) => {
        const msg = JSON.parse(event.data)

        if (msg.type === 'waiting') {
          setStatus('🟡 Looking for a stranger...')
          disableChat(true)
          addSystemMessage('Looking for someone to chat with...')
        }

        if (msg.type === 'matched') {
          setStatus('🟢 Connected to a stranger')
          disableChat(false)
          addSystemMessage('You are now chatting with a stranger. Say hi!')
        }

        if (msg.type === 'message') {
          addBubble(msg.text, 'stranger')
        }

        if (msg.type === 'partner_left') {
          setStatus('🔴 Stranger disconnected')
          disableChat(true)
          addSystemMessage('Stranger has left the chat.')
          // Auto look for a new stranger after 2 seconds
          setTimeout(() => skip(), 2000)
        }
      }

      socket.onclose = () => {
        setStatus('🔴 Disconnected')
        addSystemMessage('Connection lost.')
      }
    }

    function sendMessage() {
      const input = document.getElementById('msg-input')
      const text = input.value.trim()
      if (!text) return

      socket.send(JSON.stringify({ type: 'message', text }))
      addBubble(text, 'me')
      input.value = ''
    }

    function skip() {
      clearMessages()
      socket.send(JSON.stringify({ type: 'skip' }))
      setStatus('🟡 Looking for a stranger...')
      disableChat(true)
    }

    // ── Helpers ──

    function addBubble(text, who) {
      const div = document.createElement('div')
      div.classList.add('bubble', who)
      div.textContent = text
      document.getElementById('messages').appendChild(div)
      scrollToBottom()
    }

    function addSystemMessage(text) {
      const div = document.createElement('div')
      div.classList.add('system-msg')
      div.textContent = text
      document.getElementById('messages').appendChild(div)
      scrollToBottom()
    }

    function clearMessages() {
      document.getElementById('messages').innerHTML = ''
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text
    }

    function disableChat(disabled) {
      document.getElementById('msg-input').disabled = disabled
      document.getElementById('send-btn').disabled = disabled
      document.getElementById('skip-btn').disabled = disabled
    }

    function scrollToBottom() {
      const msgs = document.getElementById('messages')
      msgs.scrollTop = msgs.scrollHeight
    }

    // Allow pressing Enter to send
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const chatVisible = document.getElementById('chat-screen').style.display === 'flex'
        if (chatVisible) sendMessage()
        else startChat()
      }
    })
  </script>

</body>
</html>
